<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta - BioLab</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        input, select { box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #3498db !important; }

        /* Reglas INQUEBRANTABLES para la barra de desplazamiento */
        #lista-resultados {
            overflow-y: scroll !important; /* Forza el carril SIEMPRE */
            scrollbar-width: thin !important;
            scrollbar-color: #888 #f1f1f1 !important;
            -webkit-overflow-scrolling: touch;
        }

        /* Diseño grueso de la barra para PC y Android WebKit */
        #lista-resultados::-webkit-scrollbar {
            width: 14px !important; 
            display: block !important;
        }

        #lista-resultados::-webkit-scrollbar-track {
            background-color: #f1f1f1 !important; 
            border-left: 1px solid #ddd;
        }

        #lista-resultados::-webkit-scrollbar-thumb {
            background-color: #999 !important; 
            border-radius: 10px !important;
            border: 3px solid #f1f1f1 !important; 
        }

        #lista-resultados::-webkit-scrollbar-thumb:hover {
            background-color: #666 !important; 
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #2c3e50;">Mostrador BioLab</h1>

    <div id="loading" style="text-align: center; font-size: 1.2em; padding: 50px; color: #7f8c8d;">
        <i class="fas fa-spinner fa-spin"></i> Conectando con lista de precios...
    </div>

    <div id="controles-recepcion" style="display: none; max-width: 800px; margin: auto;">

        <div class="card">
            <h3><i class="fas fa-user"></i> Datos del Paciente</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                <input type="text" id="nombrePaciente" placeholder="Nombre completo" style="flex: 2; min-width: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <input type="tel" id="telPaciente" placeholder="Teléfono (Opcional)" style="flex: 1; min-width: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="number" id="edadPaciente" placeholder="Edad" min="0" style="width: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <select id="sexoPaciente" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: white; flex-grow: 1; max-width: 150px;">
                    <option value="">Sexo...</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Masculino">Masculino</option>
                </select>
            </div>
        </div>

        <div class="card" style="position: relative;">
            <input type="text" id="buscador" placeholder="🔍 Buscar estudio (ej: Glucosa, Perfil...)" onkeyup="filtrarEstudios()" style="width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
            <div id="lista-resultados" style="display: none; position: absolute; z-index: 1000; background: white; width: 100%; max-height: 250px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; margin-top: 5px;"></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-flask"></i> Estudios a Realizar</h3>
            <ul id="listaOrden" style="list-style: none; padding: 0; margin-bottom: 0;"></ul>
        </div>

        <div class="card" style="background-color: #e8f8f5;">
            <h3><i class="fas fa-cash-register"></i> Detalles de Pago</h3>
            <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                <div>
                    <label>Anticipo ($):</label>
                    <input type="number" id="anticipo" value="0" oninput="calcularCaja()" style="width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                <div>
                    <label>Descuento Especial (%):</label>
                    <input type="number" id="porcentajeDescuento" value="0" min="0" max="100" oninput="calcularCaja()" style="width: 80px; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
            </div>
            <div id="granTotal" style="font-size: 1.4em; font-weight: bold; margin-top: 15px; color: #2c3e50;">Total Original: $0</div>
            <div id="mensajeCobro" style="margin-top: 10px; font-size: 1.1em;"></div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button onclick="descargarPDF()" style="background-color: #2c3e50; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;">
                📄 Descargar Ticket PDF
            </button>
        </div>

    </div>

    <script>
        let total = 0;
        let catalogoGlobal = []; 
        const URL_GOOGLE_SHEETS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR66yXizCaHEubj6fXFqCym0caAb_avbm4Wn8p2Yq4Zu-9oU19CZHDTaxBb6HvP3nDyZ5eJNreAQMgf/pub?output=csv";

        window.onload = function() {
            cargarCatalogoDesdeNube();
        };

        function cargarCatalogoDesdeNube() {
            document.getElementById('loading').style.display = 'block';
            
            Papa.parse(URL_GOOGLE_SHEETS, {
                download: true,
                header: true,
                complete: function(results) {
                    const datos = results.data;
                    catalogoGlobal = []; 
                    
                    datos.forEach(row => {
                        if(row.Estudio && row.Precio) {
                            catalogoGlobal.push({
                                nombre: row.Estudio,
                                precio: parseFloat(row.Precio.replace(/[^0-9.]/g, '')),
                                req: `${row.Tubo || 'N/A'}. Muestra: ${row.Muestra || 'N/A'}. Req: ${row.Indicaciones || 'N/A'}.`
                            });
                        }
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('controles-recepcion').style.display = 'block';
                },
                error: function(err) {
                    alert("Error crítico: No se pudo conectar con el Google Sheets.");
                    console.error(err);
                }
            });
        }

        function filtrarEstudios() {
            let input = document.getElementById("buscador").value.toLowerCase();
            let contenedor = document.getElementById("lista-resultados");
            contenedor.innerHTML = ""; 

            if (input.length < 2) { 
                contenedor.style.display = "none";
                return;
            }

            let filtrados = catalogoGlobal.filter(e => e.nombre.toLowerCase().includes(input));

            if (filtrados.length > 0) {
                contenedor.style.display = "block";
                filtrados.forEach(est => {
                    let item = document.createElement("div");
                    item.style.padding = "15px";
                    item.style.borderBottom = "1px solid #f0f0f0";
                    item.style.cursor = "pointer";
                    item.style.transition = "all 0.15s ease"; 
                    item.innerHTML = `<div style="font-weight: bold; color: #2c3e50;">${est.nombre}</div><div style="font-size: 0.9em; color: #27ae60;">$${est.precio}</div>`;
                    
                    item.ontouchstart = function() { this.style.backgroundColor = "#e8f8f5"; };
                    item.ontouchend = function() { this.style.backgroundColor = "white"; };
                    
                    item.onclick = function() { 
                        this.style.backgroundColor = "#d1ccc0";
                        this.style.transform = "scale(0.98)";
                        
                        setTimeout(() => {
                            this.style.backgroundColor = "white";
                            this.style.transform = "scale(1)";
                            agregarEstudioDirecto(est); 
                        }, 150);
                    };
                    contenedor.appendChild(item);
                });
            } else {
                contenedor.style.display = "none";
            }
        }

        document.addEventListener("click", function(event) {
            if (!event.target.closest("#buscador") && !event.target.closest("#lista-resultados")) {
                let lista = document.getElementById("lista-resultados");
                if(lista) lista.style.display = "none";
            }
        });

        function agregarEstudioDirecto(estudioObj) {
            let idUnico = Date.now() + Math.random(); 
            total += estudioObj.precio;
            
            let lista = document.getElementById("listaOrden");
            let nuevoItem = document.createElement("li");
            nuevoItem.id = `item-${idUnico}`;
            nuevoItem.style.marginBottom = "10px";
            nuevoItem.innerHTML = `
                <div style="flex-grow: 1;">
                    <strong>${estudioObj.nombre}</strong> <span style="color: #27ae60;">($${estudioObj.precio})</span>
                    <br><small style="color: #666;">⚠️ ${estudioObj.req}</small>
                </div>
                <button onclick="eliminarEstudio('${idUnico}', ${estudioObj.precio})" style="background:#ff7675; color:white; border:none; border-radius:4px; padding:8px 12px; margin-left:10px; cursor:pointer;">X</button>
            `;
            lista.appendChild(nuevoItem);
            calcularCaja();
        }

        function eliminarEstudio(id, precio) {
            let item = document.getElementById(`item-${id}`);
            if(item) item.remove();
            total -= precio;
            if(total < 0) total = 0;
            calcularCaja();
        }

        function calcularCaja() {
            let anticipo = parseFloat(document.getElementById("anticipo").value) || 0;
            let porcentajeDesc = parseFloat(document.getElementById("porcentajeDescuento").value) || 0;
            
            let montoDescuento = total * (porcentajeDesc / 100);
            let totalFinal = total - montoDescuento;
            let restante = totalFinal - anticipo;

            let resumenTotal = `Total Original: $${total}`;
            if(porcentajeDesc > 0) {
                resumenTotal = `<s>$${total}</s> | Desc. ${porcentajeDesc}%: <span style="color: red;">-$${montoDescuento.toFixed(2)}</span> | Total a Pagar: $${totalFinal.toFixed(2)}`;
            }
            
            document.getElementById("granTotal").innerHTML = resumenTotal;
            
            let msg = document.getElementById("mensajeCobro");
            if (total === 0) {
                msg.innerHTML = ``;
            } else if (restante > 0) {
                msg.innerHTML = `<b style="color:red;">Restante a liquidar: $${restante.toFixed(2)} MXN</b>`;
            } else {
                msg.innerHTML = `<b style="color:green;">LIQUIDADO (Cambio: $${Math.abs(restante).toFixed(2)})</b>`;
            }
        }

function descargarPDF() {
            if (total === 0) {
                alert("⚠️ No hay estudios agregados a la orden.");
                return;
            }

            // 1. Extraemos los datos del paciente
            let nombre = document.getElementById("nombrePaciente").value || "Paciente_General";
            let telefono = document.getElementById("telPaciente").value || "N/A";
            let edad = document.getElementById("edadPaciente").value || "N/A";
            let sexo = document.getElementById("sexoPaciente").value || "N/A";
            
            // Extraemos los números matemáticos
            let anticipo = parseFloat(document.getElementById("anticipo").value) || 0;
            let porcentajeDesc = parseFloat(document.getElementById("porcentajeDescuento").value) || 0;
            let montoDescuento = total * (porcentajeDesc / 100);
            let totalFinal = total - montoDescuento;
            let restante = totalFinal - anticipo;

            // 2. Extraemos los estudios (Estructura de Tabla inquebrantable)
            let estudiosHTML = "";
            let items = document.querySelectorAll("#listaOrden li");
            items.forEach(li => {
                let strong = li.querySelector("strong") ? li.querySelector("strong").innerText : "";
                let span = li.querySelector("span") ? li.querySelector("span").innerText : "";
                let small = li.querySelector("small") ? li.querySelector("small").innerText : "";

                estudiosHTML += `
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 12px 0; font-size: 14px;">
                            <strong>${strong}</strong><br>
                            <span style="color:#666; font-size:12px;">${small}</span>
                        </td>
                        <td style="padding: 12px 0; text-align: right; font-size: 14px; color: #27ae60;">
                            <strong>${span}</strong>
                        </td>
                    </tr>
                `;
            });

            // 3. El Diseño del Ticket (Fondo blanco asegurado)
            let htmlParaPDF = `
                <div style="width: 800px; padding: 40px; font-family: Arial, sans-serif; color: #333; background-color: #ffffff;">
                    
                    <div style="text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 15px; margin-bottom: 20px;">
                        <h2 style="margin: 0; font-size: 24px; color: #2c3e50;">Laboratorio Clínico BioLab</h2>
                        <p style="margin: 5px 0 0 0; font-size: 14px; color: #7f8c8d;">Fecha: ${new Date().toLocaleDateString()} | Hora: ${new Date().toLocaleTimeString()}</p>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; background-color: #f9f9f9;">
                        <tr>
                            <td style="padding: 15px; border: 1px solid #ecf0f1;">
                                <p style="margin: 0 0 8px 0; font-size: 14px;"><strong>Paciente:</strong> ${nombre}</p>
                                <p style="margin: 0; font-size: 14px;"><strong>Teléfono:</strong> ${telefono} | <strong>Edad:</strong> ${edad} | <strong>Sexo:</strong> ${sexo}</p>
                            </td>
                        </tr>
                    </table>

                    <h3 style="font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px;">Estudios Solicitados:</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                        ${estudiosHTML}
                    </table>

                    <table style="width: 100%; border-collapse: collapse; border-top: 2px solid #2c3e50; margin-top: 20px;">
                        <tr>
                            <td style="text-align: right; padding-top: 15px;">
                                <p style="margin: 0 0 5px 0; font-size: 18px;"><strong>Total Original:</strong> $${total.toFixed(2)}</p>
                                ${porcentajeDesc > 0 ? `<p style="margin: 0 0 5px 0; font-size: 16px; color: #c0392b;"><strong>Descuento (${porcentajeDesc}%):</strong> -$${montoDescuento.toFixed(2)}</p><p style="margin: 0 0 5px 0; font-size: 18px;"><strong>Total a Pagar:</strong> $${totalFinal.toFixed(2)}</p>` : ''}
                                <p style="margin: 0 0 5px 0; font-size: 16px;"><strong>Anticipo Pagado:</strong> $${anticipo.toFixed(2)}</p>
                                <p style="margin: 10px 0 0 0; font-size: 18px; font-weight: bold; color: ${restante > 0 ? '#c0392b' : '#27ae60'};">${restante > 0 ? `Restante a liquidar: $${restante.toFixed(2)}` : `LIQUIDADO`}</p>
                            </td>
                        </tr>
                    </table>
                </div>
            `;

            // 4. El Truco Maestro: Construirlo DETRÁS de tu sistema
            let elementoOculto = document.createElement('div');
            elementoOculto.innerHTML = htmlParaPDF;
            elementoOculto.style.position = 'absolute';
            elementoOculto.style.top = '0';
            elementoOculto.style.left = '0';
            elementoOculto.style.zIndex = '-1000'; // Esto lo esconde detrás del fondo de tu pantalla
            
            document.body.appendChild(elementoOculto);

            let opciones = {
                margin:       0.4, 
                filename:     `Ticket_${nombre.replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // 5. El Freno de mano: Esperamos 200ms para que la computadora termine de pintarlo
            setTimeout(() => {
                html2pdf().set(opciones).from(elementoOculto).save().then(() => {
                    // Solo lo borramos cuando el PDF ya se descargó seguro
                    document.body.removeChild(elementoOculto);
                });
            }, 200);
        }
    </script>
</body>
</html>
